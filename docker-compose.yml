version: "3.9"
services:
  app:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PASS: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
volumes:
  postgres_data:
